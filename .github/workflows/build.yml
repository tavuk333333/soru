name: Build macro engine

# Rebuilds soru.exe on every push that touches engine.cpp, using
# GitHub's own Windows runner — no local Visual Studio needed.
# The compiled exe is committed straight to dist/soru.exe, along
# with dist/version.txt (the commit SHA), so the AHK script can pull
# both directly from raw.githubusercontent.com.

on:
  push:
    branches: [main]
    paths:
      - "engine.cpp"
      - "soru.rc"
      - "soru.ico"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile soru.exe
        shell: cmd
        run: |
          mkdir dist
          rc /nologo soru.rc
          cl /O2 /EHsc /MD /nologo engine.cpp soru.res ^
             /link /SUBSYSTEM:WINDOWS /ENTRY:mainCRTStartup ^
             user32.lib gdi32.lib d3d11.lib dxgi.lib winmm.lib ^
             /OUT:dist\soru.exe

      - name: Write version file
        shell: bash
        run: echo "${{ github.sha }}" > dist/version.txt

      - name: Commit built files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/soru.exe dist/version.txt
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Build soru.exe ($(git rev-parse --short HEAD))"
          git push
